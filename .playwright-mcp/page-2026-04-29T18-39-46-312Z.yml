          - paragraph [ref=e69]: Du rempaillage en paille de seigle au cannage tressé point par point, chaque siège retrouve la rigueur de sa structure d'origine. Le capitonnage se reprend au fil et au crin végétal, dans le respect des techniques héritées de l'ébénisterie française. Aucun raccourci, aucun agrafage moderne sur les pièces anciennes — la tradition exige le temps, la matière et la main.
